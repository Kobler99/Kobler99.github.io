{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}

{{ if eq .Section "blog" }}
<ul class="post-list">
  {{ range .Pages }}
  <li class="post-item">
    <span class="post-date">{{ .Date.Format "January 2, 2006" }}</span>
    <a href="{{ .RelPermalink }}" class="post-title-link">{{ .Title }}</a>
    {{ with .Params.summary }}<p class="post-summary">{{ . }}</p>{{ end }}
  </li>
  {{ end }}
</ul>
{{ end }}
{{ end }}
