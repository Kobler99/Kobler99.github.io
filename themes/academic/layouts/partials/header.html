<header class="site-header">
  <div class="container">
    <a href="{{ "/" | relURL }}" class="site-title">{{ .Site.Params.shortName | default .Site.Title }}</a>
    <nav class="site-nav">
      {{ $currentPage := . }}
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}"{{ if $currentPage.IsMenuCurrent "main" . }} class="active"{{ end }}{{ if hasPrefix .URL "http" }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
